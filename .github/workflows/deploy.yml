name: CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: flowspace
          POSTGRES_PASSWORD: flowspace
          POSTGRES_DB: flowspace_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        env:
          PYTHONPATH: ${{ github.workspace }}
          APP_ENV: test
          SECRET_KEY: test-secret-key
          DATABASE_URL: postgresql+asyncpg://flowspace:flowspace@localhost:5432/flowspace_test
          MONGODB_URL: mongodb://localhost:27017
          MONGODB_DB_NAME: flowspace_test
          REDIS_URL: redis://localhost:6379
          AWS_REGION: ap-south-1
          S3_BUCKET_NAME: test-bucket
          RAZORPAY_KEY_ID: test
          RAZORPAY_KEY_SECRET: test
          RESEND_API_KEY: test
          FRONTEND_URL: http://localhost:5173
        run: pytest tests/ -v

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd frontend
          npm install

      - name: Build frontend
        run: |
          cd frontend
          echo "VITE_API_URL=http://${{ secrets.EC2_HOST }}:8000" > .env.production
          npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Deploy to S3
        run: |
          aws s3 sync frontend/dist/ s3://flowspace-frontend-prod --delete
          aws s3 cp frontend/public/offline.html s3://flowspace-frontend-prod/offline.html

  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    needs: test
    continue-on-error: true

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          timeout: 10s
          command_timeout: 5m
          script: |
            cd /app
            git config --global --add safe.directory /app
            sudo git fetch origin
            sudo git reset --hard origin/main
            source venv/bin/activate
            pip install -r requirements.txt
            export PYTHONPATH=/app
            alembic upgrade head
            sudo systemctl restart flowspace
            echo "Backend deployed successfully"