name: Deploy Offline Page

on:
  push:
    branches: [main]
    paths:
      - 'frontend/public/offline.html'
  workflow_dispatch:

jobs:
  deploy-offline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Create bucket if not exists and upload offline page
        run: |
          aws s3 mb s3://flowspace-frontend-prod --region ap-south-1 2>/dev/null || true

          aws s3api put-bucket-ownership-controls \
            --bucket flowspace-frontend-prod \
            --ownership-controls Rules=[{ObjectOwnership=BucketOwnerPreferred}] 2>/dev/null || true

          aws s3api put-public-access-block \
            --bucket flowspace-frontend-prod \
            --public-access-block-configuration BlockPublicAcls=false,IgnorePublicAcls=false,BlockPublicPolicy=false,RestrictPublicBuckets=false

          aws s3api put-bucket-policy --bucket flowspace-frontend-prod --policy '{
            "Version": "2012-10-17",
            "Statement": [{
              "Sid": "PublicReadGetObject",
              "Effect": "Allow",
              "Principal": "*",
              "Action": "s3:GetObject",
              "Resource": "arn:aws:s3:::flowspace-frontend-prod/*"
            }]
          }'

          aws s3api put-bucket-website --bucket flowspace-frontend-prod --website-configuration '{
            "IndexDocument": {"Suffix": "index.html"},
            "ErrorDocument": {"Key": "index.html"}
          }'

          aws s3 cp frontend/public/offline.html s3://flowspace-frontend-prod/index.html
          aws s3 cp frontend/public/offline.html s3://flowspace-frontend-prod/offline.html

          echo "Offline page deployed successfully"
